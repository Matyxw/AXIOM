[package]
name    = "bot-ia-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio      = { version = "1",    features = ["full"] }
axum       = { version = "0.8" }
serde      = { version = "1",    features = ["derive"] }
serde_json = { version = "1" }
hmac       = { version = "0.12" }
sha2       = { version = "0.10" }
hex        = { version = "0.4"  }
subtle     = { version = "2"    }
reqwest            = { version = "0.12", features = ["json"] }
surrealdb          = { version = "2",    features = ["kv-surrealkv"] }
tracing            = { version = "0.1" }
tracing-subscriber = { version = "0.3",  features = ["env-filter"] }
thiserror          = "1.0"
config             = "0.14"
dotenvy            = "0.15"
# FIXME: Configurar la dependencia correcta para temporal-sdk. 
# El repo sdk-rust no contiene el paquete esperado en root.
# temporal-sdk       = { git = "https://github.com/temporalio/sdk-core", branch = "master" }
# temporal-sdk-core  = { git = "https://github.com/temporalio/sdk-core", branch = "master" }
uuid               = { version = "1.0", features = ["v4", "fast-rng"] }

