services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    volumes:
      - ..:/workspaces:cached
    command: sleep infinity

  surrealdb:
    # SOLO DESARROLLO LOCAL — modo in-memory, los datos no persisten al reiniciar.
    # NUNCA usar --pass root ni modo memory en producción.
    # En producción: SurrealDB se conecta vía variable de entorno SURREALDB_URL con TLS.
    image: surrealdb/surrealdb:latest
    command: start --log info --user root --pass root memory
    ports:
      - "8000:8000"

  temporal:
    # Servidor de desarrollo in-memory para Temporal.
    image: temporalio/admin-tools:1.23.1
    command: temporal server start-dev --ip 0.0.0.0
    ports:
      - "7233:7233" # gRPC para los Workers y Webhooks
      - "8233:8233" # UI Web para debuggear Workflows
